<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Николай & Екатерина</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat';background:#faf7f2;color:#4a3b2c;overflow-x:hidden}

.hero{height:100vh;background:url('https://images.pexels.com/photos/2253870/pexels-photo-2253870.jpeg') center/cover;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;position:relative}
.hero::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.5)}
.hero-content{position:relative;animation:fadeUp 1.5s ease}
.hero h1{font-size:3rem}

section{padding:60px 20px;text-align:center}
h2{font-family:'Playfair Display';color:#b48c5c;margin-bottom:30px}

/* TIMELINE */
.timeline{position:relative;max-width:600px;margin:auto}
.timeline::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:3px;background:#e3c9a0}
.step{position:relative;background:#fff;padding:20px;border-radius:15px;width:80%;margin:40px auto;box-shadow:0 10px 25px rgba(0,0,0,.05);transition:.4s}
.step:hover{transform:translateY(-5px) scale(1.03)}
.step::before{content:"";position:absolute;width:15px;height:15px;background:#b48c5c;border-radius:50%;left:50%;top:-10px;transform:translateX(-50%)}

.map-links a{
 display:inline-block;
 margin:5px;
 padding:10px 15px;
 background:#b48c5c;
 color:#fff;
 border-radius:20px;
 text-decoration:none;
 font-size:0.9rem;
}

iframe{width:100%;height:420px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1)}

.countdown{display:flex;justify-content:center;gap:15px}
.box{background:#f3ede5;padding:15px;border-radius:15px}
.num{font-size:2rem;color:#b48c5c}

form{max-width:400px;margin:auto}
input,select,button{width:100%;padding:12px;margin:10px 0;border-radius:30px;border:1px solid #ddd}
button{background:#b48c5c;color:#fff;border:none;cursor:pointer}
button:hover{background:#9b6e42}

.fade{opacity:0;transform:translateY(30px);transition:1s}
.show{opacity:1;transform:translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1}}
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>Николай & Екатерина</h1>
<p>17 июля 2026</p>
</div>
</div>

<section class="fade">
<h2>До свадьбы осталось</h2>
<div class="countdown">
<div class="box"><div class="num" id="d">0</div>д</div>
<div class="box"><div class="num" id="h">0</div>ч</div>
<div class="box"><div class="num" id="m">0</div>м</div>
<div class="box"><div class="num" id="s">0</div>с</div>
</div>
</section>

<section class="fade">
<h2>Маршрут дня</h2>
<div class="timeline">
<div class="step">🏠 Выкуп невесты<br><div class="map-links"><a href="https://maps.google.com/?q=46.8403,29.6433" target="_blank">Открыть карту</a></div></div>
<div class="step">🏛 Тирасполь — ЗАГС<br><div class="map-links"><a href="https://maps.google.com/?q=46.8406,29.6291" target="_blank">Открыть карту</a></div></div>
<div class="step">⛪ Бендеры — Церковь (Бастион)<br><div class="map-links"><a href="https://maps.google.com/?q=46.8304,29.4711" target="_blank">Открыть карту</a></div></div>
<div class="step">🍽 Бендеры — Ресторан Бастион<br><div class="map-links"><a href="https://maps.google.com/?q=46.8306,29.4715" target="_blank">Открыть карту</a></div></div>
</div>
</section>

<section class="fade">
<h2>Маршрут на карте</h2>
<iframe src="https://www.google.com/maps?q=46.8403,29.6433&z=10&output=embed"></iframe>
</section>

<section class="fade">
<h2>Подтвердите присутствие</h2>
<p>до 01.07.2026</p>
<form id="form">
<input type="text" id="name" placeholder="Ваше имя" required>
<select id="status" required>
<option value="">Выберите</option>
<option>Приду</option>
<option>Не смогу</option>
</select>
<button>Отправить</button>
<p id="msg"></p>
</form>
</section>

<script>

// countdown
const date=new Date("July 17, 2026 16:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=date-now;
document.getElementById("d").innerText=Math.floor(d/86400000);
document.getElementById("h").innerText=Math.floor(d%86400000/3600000);
document.getElementById("m").innerText=Math.floor(d%3600000/60000);
document.getElementById("s").innerText=Math.floor(d%60000/1000);
},1000);

// scroll animation
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
faders.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add('show');
}
});
});

// telegram send (замени username)
form.onsubmit=e=>{
e.preventDefault();
let name=document.getElementById('name').value;
let status=document.getElementById('status').value;
let text=`Гость: ${name}%0AСтатус: ${status}`;
window.open(`https://t.me/YOUR_TELEGRAM_USERNAME?text=${text}`,'_blank');
msg.innerText="Открывается Telegram для отправки";
}

</script>

</body>
</html>
